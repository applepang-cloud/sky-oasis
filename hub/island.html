<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>하늘 오아시스 — 힐링 센터</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #bfe3ff; }
  * { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }

  /* ---------- HUD (top) ---------- */
  #hud { position: fixed; top: 12px; left: 0; right: 0; display: flex; justify-content: space-between;
         align-items: flex-start; padding: 0 12px; z-index: 5; pointer-events: none; }
  #hud .left, #hud .right { display: flex; gap: 8px; align-items: center; pointer-events: auto; }
  .pill { background: rgba(255,255,255,0.86); color: #4a4030; border-radius: 20px; padding: 8px 14px;
          box-shadow: 0 6px 16px rgba(80,110,140,0.22); font-weight: 800; font-size: 15px;
          display: flex; align-items: center; gap: 7px; backdrop-filter: blur(4px); }
  .pill small { font-weight: 600; color: #8a8270; font-size: 12px; }
  #title { font-size: 16px; letter-spacing: .3px; }
  .iconbtn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px;
             background: rgba(255,255,255,0.86); color: #4a4030; box-shadow: 0 6px 16px rgba(80,110,140,0.22);
             display: flex; align-items: center; justify-content: center; transition: transform .12s; }
  .iconbtn:active { transform: scale(0.9); }

  /* ---------- build palette (bottom) ---------- */
  #dock { position: fixed; left: 0; right: 0; bottom: 0; z-index: 6; padding: 10px 10px 14px;
          display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
  #tabs { display: flex; gap: 8px; pointer-events: auto; }
  .tab { background: rgba(255,255,255,0.7); border: none; border-radius: 16px; padding: 7px 16px; cursor: pointer;
         font-weight: 700; font-size: 13px; color: #6a6150; box-shadow: 0 4px 12px rgba(80,110,140,0.18); }
  .tab.on { background: #ffd76a; color: #4a4030; }
  #palette { display: flex; gap: 8px; overflow-x: auto; max-width: calc(100vw - 16px); padding: 8px;
             background: rgba(255,255,255,0.82); border-radius: 20px; pointer-events: auto;
             box-shadow: 0 8px 22px rgba(80,110,140,0.22); backdrop-filter: blur(4px); scrollbar-width: thin; }
  .card { flex: 0 0 auto; width: 84px; border-radius: 14px; padding: 8px 6px; cursor: pointer; text-align: center;
          background: #fff7e6; border: 2px solid transparent; transition: transform .1s, border-color .1s; }
  .card:active { transform: scale(0.95); }
  .card.sel { border-color: #ffb43a; background: #fff0c8; }
  .card.locked { filter: grayscale(0.7); opacity: 0.6; }
  .card .emo { font-size: 26px; line-height: 1.1; }
  .card .nm { font-size: 11px; font-weight: 700; color: #4a4030; margin-top: 2px; white-space: nowrap;
              overflow: hidden; text-overflow: ellipsis; }
  .card .co { font-size: 11px; font-weight: 800; color: #c98a2a; margin-top: 1px; }
  .card .co.afford { color: #3a9d5d; }

  /* ---------- placement hint / sell mode ---------- */
  #hint { position: fixed; left: 50%; bottom: 116px; transform: translateX(-50%); z-index: 6;
          background: rgba(40,55,75,0.78); color: #fff; padding: 7px 14px; border-radius: 16px; font-size: 13px;
          font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
  #hint.show { opacity: 1; }

  /* floating income toasts */
  .coin { position: fixed; z-index: 7; font-weight: 800; color: #3a9d5d; font-size: 15px; pointer-events: none;
          text-shadow: 0 2px 6px rgba(255,255,255,0.8); transition: transform 1.1s ease-out, opacity 1.1s ease-out; }

  #tip { position: fixed; left: 0; top: 0; transform: translate(-50%, -130%); padding: 5px 11px; border-radius: 13px;
         background: rgba(255,255,255,0.86); color: #4a4030; font: 600 13px/1 "Segoe UI", sans-serif;
         box-shadow: 0 6px 18px rgba(80,110,140,0.25); pointer-events: none; opacity: 0; transition: opacity .15s;
         white-space: nowrap; z-index: 8; }

  /* interior back button */
  #backBtn { position: fixed; left: 12px; top: 12px; z-index: 9; display: none; }
  #toast { position: fixed; left: 50%; top: 64px; transform: translateX(-50%); z-index: 9;
           background: rgba(40,55,75,0.82); color: #fff; padding: 8px 16px; border-radius: 18px; font-size: 13px;
           font-weight: 600; opacity: 0; transition: opacity .25s; pointer-events: none; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tip"></div>

<!-- HUD -->
<div id="hud">
  <div class="left">
    <button id="backBtn" class="iconbtn">←</button>
    <div class="pill" id="title">🌴 하늘 오아시스</div>
  </div>
  <div class="right">
    <div class="pill"><span>💰</span><span id="money">0</span></div>
    <div class="pill"><span>✨</span><span id="charm">0</span><small>매력</small></div>
    <div class="pill"><span>🙂</span><span id="guests">0</span><small>손님</small></div>
  </div>
</div>

<!-- build dock -->
<div id="dock">
  <div id="hint"></div>
  <div id="tabs">
    <button class="tab on" data-cat="facility">🏠 시설</button>
    <button class="tab" data-cat="decor">🌷 장식</button>
    <button class="tab" data-cat="tools">🛠️ 운영</button>
  </div>
  <div id="palette"></div>
</div>

<div id="toast"></div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// =====================================================================
//  Sky Oasis — Healing Center Tycoon
//  All center state lives in one serializable object (`state`) so it can
//  later be synced to a server and visited by other players.
// =====================================================================

const send = (m) => { try { parent.postMessage(Object.assign({ source: 'hub' }, m), '*'); } catch (e) {} };
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const fmt = (n) => Math.floor(n).toLocaleString('en-US');

// ---------------------------------------------------------------------
//  CATALOG — everything you can place. Add new items here.
// ---------------------------------------------------------------------
// facility: guests visit it and pay `income` after `use` seconds. `charm`
//   also attracts guests. decoration: only adds `charm`.
const CATALOG = {
  // --- facilities ---
  yoga:       { cat: 'facility', name: '요가 센터',  emo: '🧘', cost: 120,  income: 9,  use: 6,  charm: 2, color: 0x8fd0a6, foot: 2 },
  meditation: { cat: 'facility', name: '명상 센터',  emo: '🕉️', cost: 240,  income: 16, use: 8,  charm: 3, color: 0xc8a6ff, foot: 2 },
  hotspring:  { cat: 'facility', name: '릴렉스 온천', emo: '♨️', cost: 480,  income: 30, use: 10, charm: 5, color: 0x6fc7e6, foot: 2 },
  sleep:      { cat: 'facility', name: '깊은 수면 방', emo: '🛏️', cost: 900,  income: 52, use: 14, charm: 7, color: 0x9aa6e6, foot: 2 },
  // --- decorations ---
  tree:    { cat: 'decor', name: '나무',   emo: '🌳', cost: 40,  charm: 3, color: 0x5fae57, foot: 1 },
  flower:  { cat: 'decor', name: '꽃밭',   emo: '🌷', cost: 15,  charm: 1, color: 0xff8fb0, foot: 1 },
  pond:    { cat: 'decor', name: '연못',   emo: '💧', cost: 80,  charm: 4, color: 0x49b6d6, foot: 1 },
  rock:    { cat: 'decor', name: '바위',   emo: '🪨', cost: 10,  charm: 1, color: 0x9a9486, foot: 1 },
  lantern: { cat: 'decor', name: '석등',   emo: '🏮', cost: 30,  charm: 2, color: 0xffd76a, foot: 1 },
  bench:   { cat: 'decor', name: '벤치',   emo: '🪑', cost: 25,  charm: 2, color: 0xb98a4e, foot: 1 },
};

// ---------------------------------------------------------------------
//  STATE  (serializable — the whole healing center)
// ---------------------------------------------------------------------
const SAVE_KEY = 'skyOasis.tycoon.v1';
const GRID = 1.15;          // world units per cell
const BASE_RADIUS = 3.0;    // starting buildable radius
const EXPAND_STEP = 0.9;    // radius added per expansion
const MAX_EXPAND = 4;

function freshState() {
  return {
    version: 1,
    name: '나의 힐링 센터',
    money: 300,
    expand: 0,                 // expansion level → radius = BASE + expand*STEP
    placed: [],                // [{key, type, cx, cz}]
    interiors: {},             // { placedKey: [{type, ix, iz}] }
    createdAt: 0,
  };
}
let state = freshState();
let nextKey = 1;

function radiusNow() { return BASE_RADIUS + state.expand * EXPAND_STEP; }
function expandCost() { return 400 + state.expand * 600; }

function save() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) { const s = JSON.parse(raw); if (s && s.version === 1) state = s; }
  } catch (e) {}
  for (const p of state.placed) { const n = parseInt(String(p.key).replace(/\D/g, ''), 10); if (n >= nextKey) nextKey = n + 1; }
}

// ---------------------------------------------------------------------
//  RENDERER / SCENE / CAMERA  (shared by island + interior)
// ---------------------------------------------------------------------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 300);

const mat = (color, o = {}) => new THREE.MeshStandardMaterial(Object.assign({ color, flatShading: true, roughness: 0.95 }, o));

// =====================================================================
//  ISLAND SCENE
// =====================================================================
const islandScene = new THREE.Scene();
islandScene.fog = new THREE.Fog(0xcfe9ff, 26, 70);
{
  const skyGeo = new THREE.SphereGeometry(110, 24, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: { top: { value: new THREE.Color(0x6fb7ff) }, mid: { value: new THREE.Color(0xbfe4ff) }, bottom: { value: new THREE.Color(0xffe9c9) } },
    vertexShader: `varying vec3 vp; void main(){ vp=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vp; uniform vec3 top; uniform vec3 mid; uniform vec3 bottom;
      void main(){ float h=normalize(vp).y; vec3 c=h>0.0?mix(mid,top,h):mix(mid,bottom,-h); gl_FragColor=vec4(c,1.0);} `,
  });
  islandScene.add(new THREE.Mesh(skyGeo, skyMat));
}
islandScene.add(new THREE.HemisphereLight(0xddeeff, 0xe7c79a, 0.95));
const sun = new THREE.DirectionalLight(0xfff1d6, 1.7);
sun.position.set(10, 16, 8); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -16; sun.shadow.camera.right = 16; sun.shadow.camera.top = 16; sun.shadow.camera.bottom = -16;
sun.shadow.bias = -0.0004;
islandScene.add(sun);

const island = new THREE.Group();
islandScene.add(island);
const landGroup = new THREE.Group();   // rebuilt on expand
const itemsGroup = new THREE.Group();  // placed objects (stable)
const guestGroup = new THREE.Group();
const ghostGroup = new THREE.Group();
island.add(landGroup, itemsGroup, guestGroup, ghostGroup);

const TOP_Y = 0;
function buildLand(radius) {
  while (landGroup.children.length) landGroup.remove(landGroup.children[0]);
  const R = radius + 1.4; // visual land extends past buildable area
  const rock = new THREE.Mesh(new THREE.CylinderGeometry(R * 0.92, 0.5, 6.5, 7, 3), mat(0x8a5a3b, { roughness: 1 }));
  rock.position.y = TOP_Y - 3.4; rock.castShadow = true; rock.receiveShadow = true;
  const p = rock.geometry.attributes.position;
  for (let i = 0; i < p.count; i++) { const y = p.getY(i); if (y > -3.2 && y < 3.1) { p.setX(i, p.getX(i) + Math.sin(i * 12.9) * 0.25); p.setZ(i, p.getZ(i) + Math.cos(i * 7.3) * 0.25); } }
  p.needsUpdate = true; rock.geometry.computeVertexNormals(); landGroup.add(rock);

  const sand = new THREE.Mesh(new THREE.CylinderGeometry(R, R * 0.95, 1.1, 7), mat(0xf3d9a0));
  sand.position.y = TOP_Y - 0.55; sand.castShadow = true; sand.receiveShadow = true; landGroup.add(sand);
  const grass = new THREE.Mesh(new THREE.CylinderGeometry(R + 0.05, R, 0.35, 7), mat(0x8fc06a));
  grass.position.y = TOP_Y + 0.02; grass.receiveShadow = true; landGroup.add(grass);
  const surf = new THREE.Mesh(new THREE.CircleGeometry(R, 32), mat(0xf6e2b0));
  surf.rotation.x = -Math.PI / 2; surf.position.y = TOP_Y + 0.2; surf.receiveShadow = true; landGroup.add(surf);

  // invisible pad for raycasting cell positions
  const pad = new THREE.Mesh(new THREE.CircleGeometry(R, 8), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
  pad.rotation.x = -Math.PI / 2; pad.position.y = TOP_Y + 0.21; pad.name = 'pad'; landGroup.add(pad);
}

// clouds + motes (ambience)
const clouds = [];
function makeCloud(x, y, z, s) {
  const g = new THREE.Group();
  const m = mat(0xffffff, { roughness: 1, emissive: 0xeaf4ff, emissiveIntensity: 0.05 });
  const n = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) { const puff = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8 + Math.random() * 0.6, 0), m); puff.position.set((i - n / 2) * 0.9, Math.random() * 0.3, Math.random() * 0.5 - 0.25); puff.scale.y = 0.7; g.add(puff); }
  g.position.set(x, y, z); g.scale.setScalar(s); g.userData.speed = 0.15 + Math.random() * 0.2; islandScene.add(g); clouds.push(g);
}
makeCloud(-12, 4, -7, 1.1); makeCloud(13, 6, 3, 1.4); makeCloud(-9, -2, 9, 1.0); makeCloud(10, -4, -8, 1.2); makeCloud(0, 8, -14, 1.6);
let motes;
{
  const N = 80, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) { const r = 5 + Math.random() * 8, a = Math.random() * Math.PI * 2; pos[i * 3] = Math.cos(a) * r; pos[i * 3 + 1] = Math.random() * 8 - 1; pos[i * 3 + 2] = Math.sin(a) * r; }
  const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  motes = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xfff3c4, size: 0.16, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false }));
  islandScene.add(motes);
}

// entrance marker (where guests arrive)
const entrance = new THREE.Vector3(0, TOP_Y + 0.2, 0);
function placeEntrance() {
  const r = radiusNow() + 1.0;
  entrance.set(0, TOP_Y + 0.2, r);
}

// ---------------------------------------------------------------------
//  MESH BUILDERS for catalog items (low-poly)
// ---------------------------------------------------------------------
function buildItemMesh(type) {
  const def = CATALOG[type];
  const g = new THREE.Group();
  const c = def.color;
  switch (type) {
    case 'yoga': {
      const plat = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 1.0, 0.18, 12), mat(c)); plat.position.y = 0.09; plat.receiveShadow = true; g.add(plat);
      for (let i = 0; i < 3; i++) { const arc = new THREE.Mesh(new THREE.TorusGeometry(0.5 - i * 0.13, 0.05, 6, 16, Math.PI), mat(0xffffff, { emissive: 0xbfe4ff, emissiveIntensity: 0.2 })); arc.position.set(0, 0.2 + i * 0.18, 0); arc.castShadow = true; g.add(arc); }
      break;
    }
    case 'meditation': {
      const base = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 1.05, 0.22, 8), mat(0xf0e3c8)); base.position.y = 0.11; base.receiveShadow = true; g.add(base);
      const dome = new THREE.Mesh(new THREE.SphereGeometry(0.62, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2), mat(c, { roughness: 0.6 })); dome.position.y = 0.22; dome.castShadow = true; g.add(dome);
      const tip = new THREE.Mesh(new THREE.OctahedronGeometry(0.14, 0), mat(0xffd76a, { emissive: 0xffd76a, emissiveIntensity: 0.5 })); tip.position.y = 0.95; g.add(tip);
      break;
    }
    case 'hotspring': {
      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.78, 0.22, 6, 14), mat(0x9a9486)); ring.rotation.x = -Math.PI / 2; ring.position.y = 0.2; ring.castShadow = true; g.add(ring);
      const water = new THREE.Mesh(new THREE.CircleGeometry(0.78, 16), new THREE.MeshStandardMaterial({ color: c, roughness: 0.12, metalness: 0.1, transparent: true, opacity: 0.92 })); water.rotation.x = -Math.PI / 2; water.position.y = 0.26; g.add(water);
      for (let i = 0; i < 3; i++) { const st = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 5), mat(0xffffff, { transparent: true, opacity: 0.5 })); st.position.set((i - 1) * 0.3, 0.5, 0); g.add(st); }
      break;
    }
    case 'sleep': {
      const room = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.9, 1.7), mat(0xf3ead8)); room.position.y = 0.55; room.castShadow = true; room.receiveShadow = true; g.add(room);
      const roof = new THREE.Mesh(new THREE.ConeGeometry(1.45, 0.7, 4), mat(c)); roof.position.y = 1.32; roof.rotation.y = Math.PI / 4; roof.castShadow = true; g.add(roof);
      const moon = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 6), mat(0xffe9a8, { emissive: 0xffe9a8, emissiveIntensity: 0.5 })); moon.position.set(0, 1.0, 0.86); g.add(moon);
      break;
    }
    case 'tree': {
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.16, 0.9, 6), mat(0xb98a4e)); trunk.position.y = 0.45; trunk.castShadow = true; g.add(trunk);
      for (let i = 0; i < 2; i++) { const blob = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5 - i * 0.12, 0), mat(c)); blob.position.y = 1.0 + i * 0.35; blob.castShadow = true; g.add(blob); }
      break;
    }
    case 'flower': {
      for (let i = 0; i < 5; i++) { const a = (i / 5) * Math.PI * 2; const st = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4), mat(0x5fae57)); st.position.set(Math.cos(a) * 0.22, 0.15, Math.sin(a) * 0.22); g.add(st); const fl = new THREE.Mesh(new THREE.IcosahedronGeometry(0.1, 0), mat(i % 2 ? c : 0xffd76a)); fl.position.set(Math.cos(a) * 0.22, 0.33, Math.sin(a) * 0.22); g.add(fl); }
      break;
    }
    case 'pond': {
      const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.66, 0.18, 12), mat(0xe8c98a)); rim.position.y = 0.09; rim.receiveShadow = true; g.add(rim);
      const water = new THREE.Mesh(new THREE.CircleGeometry(0.52, 16), new THREE.MeshStandardMaterial({ color: c, roughness: 0.12, metalness: 0.1, transparent: true, opacity: 0.92 })); water.rotation.x = -Math.PI / 2; water.position.y = 0.19; g.add(water);
      break;
    }
    case 'rock': {
      const r = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4, 0), mat(c)); r.position.y = 0.3; r.rotation.set(Math.random(), Math.random(), Math.random()); r.castShadow = true; g.add(r);
      break;
    }
    case 'lantern': {
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.7, 6), mat(0x9a9486)); post.position.y = 0.35; post.castShadow = true; g.add(post);
      const lamp = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.3, 0.26), mat(c, { emissive: c, emissiveIntensity: 0.6 })); lamp.position.y = 0.82; g.add(lamp);
      break;
    }
    case 'bench': {
      const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.08, 0.26), mat(c)); seat.position.y = 0.3; seat.castShadow = true; g.add(seat);
      const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.26, 0.06), mat(c)); back.position.set(0, 0.45, -0.1); g.add(back);
      for (const sx of [-0.28, 0.28]) { const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.3, 0.2), mat(0x8a6a3e)); leg.position.set(sx, 0.15, 0); g.add(leg); }
      break;
    }
    default: g.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), mat(c)));
  }
  return g;
}

// little low-poly guest
function buildGuest() {
  const g = new THREE.Group();
  const hue = [0xe88c8c, 0x8cb6e8, 0x9ce0a0, 0xe8c98c, 0xc8a6ff, 0xf0a6d0][Math.floor(Math.random() * 6)];
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.2, 0.5, 7), mat(hue)); body.position.y = 0.25; body.castShadow = true; g.add(body);
  const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.16, 0), mat(0xf5d6b8)); head.position.y = 0.62; head.castShadow = true; g.add(head);
  return g;
}

// =====================================================================
//  PLACED OBJECTS (live, mirrors state.placed)
// =====================================================================
const liveItems = new Map(); // key -> { def, type, cx, cz, mesh, occupied, useT }

function cellToWorld(cx, cz) { return new THREE.Vector3(cx * GRID, TOP_Y + 0.2, cz * GRID); }
function cellOccupied(cx, cz) { for (const it of liveItems.values()) if (it.cx === cx && it.cz === cz) return true; return false; }
function cellInBounds(cx, cz) { const w = cellToWorld(cx, cz); return Math.hypot(w.x, w.z) <= radiusNow(); }

function spawnLiveItem(rec) {
  const def = CATALOG[rec.type];
  const mesh = buildItemMesh(rec.type);
  const w = cellToWorld(rec.cx, rec.cz);
  mesh.position.copy(w);
  mesh.userData.key = rec.key;
  itemsGroup.add(mesh);
  // pop-in animation
  mesh.scale.setScalar(0.01); mesh.userData.popT = 0;
  liveItems.set(rec.key, { key: rec.key, def, type: rec.type, cx: rec.cx, cz: rec.cz, mesh, occupied: false, useT: 0 });
}

function placeItem(type, cx, cz) {
  const def = CATALOG[type];
  if (state.money < def.cost) { toast('돈이 부족해요 💰'); return false; }
  if (cellOccupied(cx, cz) || !cellInBounds(cx, cz)) { toast('여기엔 둘 수 없어요'); return false; }
  state.money -= def.cost;
  const rec = { key: 'k' + (nextKey++), type, cx, cz };
  state.placed.push(rec);
  spawnLiveItem(rec);
  refreshHUD(); save();
  return true;
}

function rebuildAll() {
  for (const it of liveItems.values()) itemsGroup.remove(it.mesh);
  liveItems.clear();
  for (const rec of state.placed) { if (!rec.key) rec.key = 'k' + (nextKey++); spawnLiveItem(rec); }
}

function totalCharm() {
  let c = 0; for (const it of liveItems.values()) c += it.def.charm || 0; return c;
}
function facilities() { return [...liveItems.values()].filter((it) => it.def.cat === 'facility'); }

// =====================================================================
//  GUESTS  (spawn → walk to facility → use → pay → leave)
// =====================================================================
const guests = [];
let spawnTimer = 2;
let earnedTotal = 0;

function spawnGuest() {
  const facs = facilities();
  const free = facs.filter((f) => !f.occupied);
  if (free.length === 0) return; // nowhere to go yet
  const target = free[Math.floor(Math.random() * free.length)];
  target.occupied = true;
  const mesh = buildGuest();
  mesh.position.copy(entrance);
  guestGroup.add(mesh);
  guests.push({ mesh, phase: 'walk', target, t: 0, from: entrance.clone() });
}

function guestArriveWorld(it) { const w = cellToWorld(it.cx, it.cz); return new THREE.Vector3(w.x, TOP_Y + 0.2, w.z + (it.def.foot > 1 ? 1.0 : 0.6)); }

function updateGuests(dt) {
  for (let i = guests.length - 1; i >= 0; i--) {
    const gst = guests[i];
    if (gst.phase === 'walk') {
      const dest = guestArriveWorld(gst.target);
      const d = dest.clone().sub(gst.mesh.position); d.y = 0;
      const dist = d.length();
      if (dist > 0.05) { d.normalize(); gst.mesh.position.addScaledVector(d, Math.min(dist, dt * 1.6)); gst.mesh.rotation.y = Math.atan2(d.x, d.z); gst.mesh.position.y = TOP_Y + 0.2 + Math.abs(Math.sin(performance.now() * 0.01)) * 0.04; }
      else { gst.phase = 'use'; gst.t = gst.target.def.use; }
    } else if (gst.phase === 'use') {
      gst.t -= dt;
      gst.target.useT = (gst.target.useT || 0) + dt;
      gst.mesh.position.y = TOP_Y + 0.2 + Math.sin(performance.now() * 0.004) * 0.03;
      if (gst.t <= 0) {
        const gain = Math.round(gst.target.def.income * (1 + totalCharm() * 0.01));
        state.money += gain; earnedTotal += gain;
        floatCoin(gst.mesh.position, '+' + gain);
        gst.target.occupied = false;
        gst.phase = 'leave'; gst.from = gst.mesh.position.clone(); gst.t = 0;
        refreshHUD();
      }
    } else if (gst.phase === 'leave') {
      const dest = entrance;
      const d = dest.clone().sub(gst.mesh.position); d.y = 0;
      const dist = d.length();
      if (dist > 0.08) { d.normalize(); gst.mesh.position.addScaledVector(d, dt * 1.8); gst.mesh.rotation.y = Math.atan2(d.x, d.z); }
      else { guestGroup.remove(gst.mesh); guests.splice(i, 1); }
    }
  }
}

const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
let ghost = null, ghostCell = null;

function clearGhost() { if (ghost) { ghostGroup.remove(ghost); ghost = null; } ghostCell = null; }

function padHit(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  const pad = landGroup.getObjectByName('pad');
  if (!pad) return null;
  const hit = ray.intersectObject(pad, false)[0];
  return hit ? hit.point : null;
}
function worldToCell(pt) {
  const local = island.worldToLocal(pt.clone());
  return { cx: Math.round(local.x / GRID), cz: Math.round(local.z / GRID) };
}

function updateGhost(clientX, clientY) {
  if (!selType) return;
  const pt = padHit(clientX, clientY);
  if (!pt) { clearGhost(); return; }
  const { cx, cz } = worldToCell(pt);
  ghostCell = { cx, cz };
  const w = cellToWorld(cx, cz);
  if (!ghost) { ghost = buildItemMesh(selType); ghost.traverse((o) => { if (o.material) { o.material = o.material.clone(); o.material.transparent = true; o.material.opacity = 0.55; } }); ghostGroup.add(ghost); }
  ghost.position.copy(w);
  const ok = !cellOccupied(cx, cz) && cellInBounds(cx, cz) && state.money >= CATALOG[selType].cost;
  ghost.traverse((o) => { if (o.material && o.material.emissive !== undefined) o.material.color.setHex(ok ? CATALOG[selType].color : 0xff6b6b); });
}

function pickItem(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(itemsGroup.children, true);
  if (!hits[0]) return null;
  let o = hits[0].object; while (o && o.userData.key === undefined && o.parent) o = o.parent;
  return o && o.userData.key !== undefined ? liveItems.get(o.userData.key) : null;
}

function sellItem(it) {
  const refund = Math.round(it.def.cost * 0.5);
  state.money += refund;
  itemsGroup.remove(it.mesh); liveItems.delete(it.key);
  state.placed = state.placed.filter((r) => r.key !== it.key);
  // release any guest targeting it
  for (let i = guests.length - 1; i >= 0; i--) if (guests[i].target === it) { guestGroup.remove(guests[i].mesh); guests.splice(i, 1); }
  floatCoin(it.mesh.position, '+' + refund); refreshHUD(); save();
}

let dragging = false, moved = 0, lastX = 0, lastY = 0;
let camAz = 0.5, targetAz = 0.5, camTilt = 0.42, targetTilt = 0.42, camDist = 16, targetDist = 16;
let inAz = 0.0, inTargetAz = 0.0, inTilt = 0.5;
const tipEl = $('tip');

canvas.addEventListener('pointerdown', (e) => { dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY; });
canvas.addEventListener('pointermove', (e) => {
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY; moved += Math.abs(dx) + Math.abs(dy); lastX = e.clientX; lastY = e.clientY;
    if (mode === 'island') { targetAz -= dx * 0.005; targetTilt = clamp(targetTilt - dy * 0.003, 0.12, 0.95); }
    else { inTargetAz -= dx * 0.005; inTilt = clamp(inTilt - dy * 0.003, 0.15, 1.0); }
  } else if (mode === 'island') {
    if (selType) updateGhost(e.clientX, e.clientY);
    else {
      const it = pickItem(e.clientX, e.clientY);
      if (it) { tipEl.textContent = it.def.cat === 'facility' ? `${it.def.name} · 탭해서 입장` : it.def.name; tipEl.style.left = e.clientX + 'px'; tipEl.style.top = e.clientY + 'px'; tipEl.style.opacity = 1; canvas.style.cursor = 'pointer'; }
      else { tipEl.style.opacity = 0; canvas.style.cursor = 'grab'; }

  }
});
canvas.addEventListener('pointerup', (e) => {
  dragging = false;

  if (selType) { if (ghostCell && placeItem(selType, ghostCell.cx, ghostCell.cz)) { /* keep selType for rapid placing */ updateGhost(e.clientX, e.clientY); } return; }
  const it = pickItem(e.clientX, e.clientY);
  if (it) {
    if (sellMode) { sellItem(it); return; }
    if (it.def.cat === 'facility') enterInterior(it.key);
  }
});

function resize() { const w = innerWidth, h = innerHeight; renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();

let last = performance.now(), saveAccum = 0;
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.05, (now - last) / 1000); last = now;

  if (mode === 'island') {
    if (!dragging && !selType) targetAz += 0.0006;
    camAz = lerp(camAz, targetAz, 0.08); camTilt = lerp(camTilt, targetTilt, 0.08); camDist = lerp(camDist, targetDist, 0.08);
    camera.position.set(Math.sin(camAz) * camDist * Math.cos(camTilt), 4 + Math.sin(camTilt) * camDist * 0.7, Math.cos(camAz) * camDist * Math.cos(camTilt));
    camera.lookAt(0, 0.3, 0);
    island.position.y = Math.sin(now * 0.0006) * 0.16;

    // item pop-in
    for (const it of liveItems.values()) { if (it.mesh.userData.popT < 1) { it.mesh.userData.popT = Math.min(1, it.mesh.userData.popT + dt * 4); const s = 1 - Math.pow(1 - it.mesh.userData.popT, 3); it.mesh.scale.setScalar(s); } }

    // guests
    spawnTimer -= dt;
    const interval = clamp(7 - totalCharm() * 0.08, 2.2, 7);
    if (spawnTimer <= 0 && guests.length < 14) { spawnTimer = interval; spawnGuest(); }
    updateGuests(dt);
    guestsEl.textContent = guests.length;

    for (const c of clouds) { c.position.x += c.userData.speed * 0.01; if (c.position.x > 18) c.position.x = -18; }
    if (motes) { const p = motes.geometry.attributes.position; for (let i = 0; i < p.count; i++) { let y = p.getY(i) + 0.006; if (y > 8) y = -1; p.setY(i, y); } p.needsUpdate = true; }

    renderer.render(islandScene, camera);
  } else {
    inAz = lerp(inAz, inTargetAz, 0.08);
    const d = 13;
    camera.position.set(Math.sin(inAz) * d * Math.cos(inTilt), 3 + Math.sin(inTilt) * d, Math.cos(inAz) * d * Math.cos(inTilt));
    camera.lookAt(0, 1.0, -0.5);
    renderer.render(interiorScene, camera);
  }

  saveAccum += dt; if (saveAccum > 8) { saveAccum = 0; save(); }
}

  spawn: spawnGuest, enter: enterInterior, exit: exitInterior, save, reset: () => { state = freshState(); rebuildAll(); buildLand(radiusNow()); refreshHUD(); },
  CATALOG,
  // headless-friendly simulation stepper (the render loop is paused when the
  // preview tab is hidden, so tests can advance time manually)
  tick: (n = 1, dt = 0.1) => { for (let i = 0; i < n; i++) updateGuests(dt); refreshHUD(); return state.money; },
};
</script>
</body>
</html>
