<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>하늘 오아시스 — 힐링 센터</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #bfe3ff; }
  * { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }

  #hud { position: fixed; top: 12px; left: 0; right: 0; display: flex; justify-content: space-between;
         align-items: flex-start; padding: 0 12px; z-index: 5; pointer-events: none; }
  #hud .left, #hud .right { display: flex; gap: 8px; align-items: center; pointer-events: auto; flex-wrap: wrap; }
  .pill { background: rgba(255,255,255,0.86); color: #4a4030; border-radius: 20px; padding: 8px 14px;
          box-shadow: 0 6px 16px rgba(80,110,140,0.22); font-weight: 800; font-size: 15px;
          display: flex; align-items: center; gap: 7px; backdrop-filter: blur(4px); }
  .pill small { font-weight: 600; color: #8a8270; font-size: 12px; }
  #title { font-size: 16px; letter-spacing: .3px; }
  .iconbtn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px;
             background: rgba(255,255,255,0.86); color: #4a4030; box-shadow: 0 6px 16px rgba(80,110,140,0.22);
             display: flex; align-items: center; justify-content: center; transition: transform .12s; }
  .iconbtn:active { transform: scale(0.9); }

  #dock { position: fixed; left: 0; right: 0; bottom: 0; z-index: 6; padding: 10px 10px 14px;
          display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
  #tabs { display: flex; gap: 8px; pointer-events: auto; }
  .tab { background: rgba(255,255,255,0.7); border: none; border-radius: 16px; padding: 7px 16px; cursor: pointer;
         font-weight: 700; font-size: 13px; color: #6a6150; box-shadow: 0 4px 12px rgba(80,110,140,0.18); }
  .tab.on { background: #ffd76a; color: #4a4030; }
  #palette { display: flex; gap: 8px; overflow-x: auto; max-width: calc(100vw - 16px); padding: 8px;
             background: rgba(255,255,255,0.82); border-radius: 20px; pointer-events: auto;
             box-shadow: 0 8px 22px rgba(80,110,140,0.22); backdrop-filter: blur(4px); scrollbar-width: thin; }
  .card { flex: 0 0 auto; width: 84px; border-radius: 14px; padding: 8px 6px; cursor: pointer; text-align: center;
          background: #fff7e6; border: 2px solid transparent; transition: transform .1s, border-color .1s; }
  .card:active { transform: scale(0.95); }
  .card.sel { border-color: #ffb43a; background: #fff0c8; }
  .card .emo { font-size: 26px; line-height: 1.1; }
  .card .nm { font-size: 11px; font-weight: 700; color: #4a4030; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .co { font-size: 11px; font-weight: 800; color: #c98a2a; margin-top: 1px; }
  .card .co.afford { color: #3a9d5d; }

  #hint { position: fixed; left: 50%; bottom: 116px; transform: translateX(-50%); z-index: 6;
          background: rgba(40,55,75,0.78); color: #fff; padding: 7px 14px; border-radius: 16px; font-size: 13px;
          font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
  #hint.show { opacity: 1; }

  .coin { position: fixed; z-index: 7; font-weight: 800; font-size: 15px; pointer-events: none;
          text-shadow: 0 2px 6px rgba(255,255,255,0.8); transition: transform 1.1s ease-out, opacity 1.1s ease-out; }

  #tip { position: fixed; left: 0; top: 0; transform: translate(-50%, -130%); padding: 5px 11px; border-radius: 13px;
         background: rgba(255,255,255,0.86); color: #4a4030; font: 600 13px/1 "Segoe UI", sans-serif;
         box-shadow: 0 6px 18px rgba(80,110,140,0.25); pointer-events: none; opacity: 0; transition: opacity .15s;
         white-space: nowrap; z-index: 8; }

  #backBtn { position: fixed; left: 12px; top: 12px; z-index: 9; display: none; }
  #toast { position: fixed; left: 50%; top: 64px; transform: translateX(-50%); z-index: 9;
           background: rgba(40,55,75,0.82); color: #fff; padding: 8px 16px; border-radius: 18px; font-size: 13px;
           font-weight: 600; opacity: 0; transition: opacity .25s; pointer-events: none; }
  #toast.show { opacity: 1; }

  /* facility popup */
  #facPopup { position: fixed; left: 50%; bottom: 120px; transform: translateX(-50%) translateY(14px); z-index: 8;
              width: min(300px, calc(100vw - 28px)); background: rgba(255,255,255,0.95); border-radius: 22px; padding: 16px;
              box-shadow: 0 12px 30px rgba(80,110,140,0.3); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
  #facPopup.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  #facPopup .fp-title { font-size: 18px; font-weight: 800; color: #4a4030; }
  #facPopup .fp-stats { font-size: 13px; color: #6a6150; margin: 8px 0 14px; line-height: 1.7; }
  #facPopup .fp-stats b { color: #3a9d5d; }
  #facPopup .fp-btns { display: flex; gap: 8px; }
  #facPopup button { flex: 1; border: none; border-radius: 14px; padding: 11px 8px; font-weight: 800; font-size: 14px; cursor: pointer; }
  #facPopup .fp-enter { background: #cfe7ff; color: #2b4a6b; }
  #facPopup .fp-up { background: #ffd76a; color: #6b4e10; }
  #facPopup .fp-up:disabled { background: #e6e0d4; color: #a8a08c; cursor: default; }
  #facPopup .fp-close { position: absolute; top: 10px; right: 12px; width: 30px; height: 30px; flex: none; padding: 0;
                        background: #f0ece2; color: #8a8270; border-radius: 50%; font-size: 14px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tip"></div>

<div id="hud">
  <div class="left">
    <button id="backBtn" class="iconbtn">←</button>
    <div class="pill" id="title">🌴 하늘 오아시스</div>
  </div>
  <div class="right">
    <div class="pill"><span>💰</span><span id="money">0</span></div>
    <div class="pill"><span>✨</span><span id="charm">0</span><small>매력</small></div>
    <div class="pill"><span id="moodIco">😊</span><span id="sat">100</span><small>만족</small></div>
    <div class="pill"><span>🙂</span><span id="guests">0</span><small>손님</small></div>
  </div>
</div>

<div id="dock">
  <div id="hint"></div>
  <div id="tabs">
    <button class="tab on" data-cat="facility">🏠 시설</button>
    <button class="tab" data-cat="decor">🌷 장식</button>
    <button class="tab" data-cat="tools">🛠️ 운영</button>
  </div>
  <div id="palette"></div>
</div>

<div id="facPopup">
  <button class="fp-close">✕</button>
  <div class="fp-title"></div>
  <div class="fp-stats"></div>
  <div class="fp-btns">
    <button class="fp-enter">🚪 입장</button>
    <button class="fp-up"></button>
  </div>
</div>

<div id="toast"></div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const send = (m) => { try { parent.postMessage(Object.assign({ source: 'hub' }, m), '*'); } catch (e) {} };
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const fmt = (n) => Math.floor(n).toLocaleString('en-US');
const cLerp = (a, b, t) => new THREE.Color(a).lerp(new THREE.Color(b), t);

// ---------------------------------------------------------------------
//  CATALOG
// ---------------------------------------------------------------------
const CATALOG = {
  yoga:       { cat: 'facility', name: '요가 센터',  emo: '🧘', cost: 120,  income: 9,  use: 6,  charm: 2, cap: 2, color: 0x8fd0a6 },
  meditation: { cat: 'facility', name: '명상 센터',  emo: '🕉️', cost: 240,  income: 16, use: 8,  charm: 3, cap: 2, color: 0xc8a6ff },
  hotspring:  { cat: 'facility', name: '릴렉스 온천', emo: '♨️', cost: 480,  income: 30, use: 10, charm: 5, cap: 3, color: 0x6fc7e6 },
  sleep:      { cat: 'facility', name: '깊은 수면 방', emo: '🛏️', cost: 900,  income: 52, use: 14, charm: 7, cap: 2, color: 0x9aa6e6 },
  tree:    { cat: 'decor', name: '나무',   emo: '🌳', cost: 40,  charm: 3, color: 0x5fae57 },
  flower:  { cat: 'decor', name: '꽃밭',   emo: '🌷', cost: 15,  charm: 1, color: 0xff8fb0 },
  pond:    { cat: 'decor', name: '연못',   emo: '💧', cost: 80,  charm: 4, color: 0x49b6d6 },
  rock:    { cat: 'decor', name: '바위',   emo: '🪨', cost: 10,  charm: 1, color: 0x9a9486 },
  lantern: { cat: 'decor', name: '석등',   emo: '🏮', cost: 30,  charm: 2, color: 0xffd76a },
  bench:   { cat: 'decor', name: '벤치',   emo: '🪑', cost: 25,  charm: 2, color: 0xb98a4e },
};
const facIncome = (def, lvl) => Math.round(def.income * (1 + (lvl - 1) * 0.6));
const facCapacity = (def, lvl) => (def.cap || 1) + Math.floor((lvl - 1) / 2);
const upgradeCost = (def, lvl) => Math.round(def.cost * (0.6 + 0.5 * lvl));
const MAX_LEVEL = 8;

// ---------------------------------------------------------------------
//  STATE
// ---------------------------------------------------------------------
const SAVE_KEY = 'skyOasis.tycoon.v1';
const GRID = 1.15, BASE_RADIUS = 3.0, EXPAND_STEP = 0.9, MAX_EXPAND = 4;

function freshState() {
  return { version: 1, name: '나의 힐링 센터', money: 300, expand: 0, placed: [], interiors: {}, createdAt: 0 };
}
let state = freshState();
let nextKey = 1;
const radiusNow = () => BASE_RADIUS + state.expand * EXPAND_STEP;
const expandCost = () => 400 + state.expand * 600;

function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) {} }
function load() {
  try { const raw = localStorage.getItem(SAVE_KEY); if (raw) { const s = JSON.parse(raw); if (s && s.version === 1) state = s; } } catch (e) {}
  for (const p of state.placed) {
    if (!p.key) p.key = 'k' + (nextKey++);
    const n = parseInt(String(p.key).replace(/\D/g, ''), 10); if (n >= nextKey) nextKey = n + 1;
    if (CATALOG[p.type] && CATALOG[p.type].cat === 'facility' && !p.level) p.level = 1; // migrate
  }
}
const recOf = (key) => state.placed.find((r) => r.key === key);

// ---------------------------------------------------------------------
//  RENDERER / CAMERA
// ---------------------------------------------------------------------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.05;
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 300);
const mat = (color, o = {}) => new THREE.MeshStandardMaterial(Object.assign({ color, flatShading: true, roughness: 0.95 }, o));

// ---------------------------------------------------------------------
//  ISLAND SCENE
// ---------------------------------------------------------------------
const islandScene = new THREE.Scene();
islandScene.fog = new THREE.Fog(0xcfe9ff, 26, 70);
let skyMat;
{
  const skyGeo = new THREE.SphereGeometry(110, 24, 16);
  skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: { top: { value: new THREE.Color(0x6fb7ff) }, mid: { value: new THREE.Color(0xbfe4ff) }, bottom: { value: new THREE.Color(0xffe9c9) } },
    vertexShader: `varying vec3 vp; void main(){ vp=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vp; uniform vec3 top; uniform vec3 mid; uniform vec3 bottom;
      void main(){ float h=normalize(vp).y; vec3 c=h>0.0?mix(mid,top,h):mix(mid,bottom,-h); gl_FragColor=vec4(c,1.0);} `,
  });
  islandScene.add(new THREE.Mesh(skyGeo, skyMat));
}
const hemi = new THREE.HemisphereLight(0xddeeff, 0xe7c79a, 0.95);
islandScene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff1d6, 1.7);
sun.position.set(10, 16, 8); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
sun.shadow.camera.left = -16; sun.shadow.camera.right = 16; sun.shadow.camera.top = 16; sun.shadow.camera.bottom = -16;
sun.shadow.bias = -0.0004;
islandScene.add(sun);
const moonLight = new THREE.DirectionalLight(0x9fb6e6, 0.0); // soft fill at night
moonLight.position.set(-8, 12, -6); islandScene.add(moonLight);

const island = new THREE.Group(); islandScene.add(island);
const landGroup = new THREE.Group(), itemsGroup = new THREE.Group(), guestGroup = new THREE.Group(), ghostGroup = new THREE.Group();
island.add(landGroup, itemsGroup, guestGroup, ghostGroup);

const TOP_Y = 0;
function buildLand(radius) {
  while (landGroup.children.length) landGroup.remove(landGroup.children[0]);
  const R = radius + 1.4;
  const rock = new THREE.Mesh(new THREE.CylinderGeometry(R * 0.92, 0.5, 6.5, 7, 3), mat(0x8a5a3b, { roughness: 1 }));
  rock.position.y = TOP_Y - 3.4; rock.castShadow = true; rock.receiveShadow = true;
  const p = rock.geometry.attributes.position;
  for (let i = 0; i < p.count; i++) { const y = p.getY(i); if (y > -3.2 && y < 3.1) { p.setX(i, p.getX(i) + Math.sin(i * 12.9) * 0.25); p.setZ(i, p.getZ(i) + Math.cos(i * 7.3) * 0.25); } }
  p.needsUpdate = true; rock.geometry.computeVertexNormals(); landGroup.add(rock);
  const sand = new THREE.Mesh(new THREE.CylinderGeometry(R, R * 0.95, 1.1, 7), mat(0xf3d9a0)); sand.position.y = TOP_Y - 0.55; sand.castShadow = true; sand.receiveShadow = true; landGroup.add(sand);
  const grass = new THREE.Mesh(new THREE.CylinderGeometry(R + 0.05, R, 0.35, 7), mat(0x8fc06a)); grass.position.y = TOP_Y + 0.02; grass.receiveShadow = true; landGroup.add(grass);
  const surf = new THREE.Mesh(new THREE.CircleGeometry(R, 32), mat(0xf6e2b0)); surf.rotation.x = -Math.PI / 2; surf.position.y = TOP_Y + 0.2; surf.receiveShadow = true; landGroup.add(surf);
  const pad = new THREE.Mesh(new THREE.CircleGeometry(R, 8), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })); pad.rotation.x = -Math.PI / 2; pad.position.y = TOP_Y + 0.21; pad.name = 'pad'; landGroup.add(pad);
}

const clouds = [];
function makeCloud(x, y, z, s) {
  const g = new THREE.Group(); const m = mat(0xffffff, { roughness: 1, emissive: 0xeaf4ff, emissiveIntensity: 0.05 });
  const n = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) { const puff = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8 + Math.random() * 0.6, 0), m); puff.position.set((i - n / 2) * 0.9, Math.random() * 0.3, Math.random() * 0.5 - 0.25); puff.scale.y = 0.7; g.add(puff); }
  g.position.set(x, y, z); g.scale.setScalar(s); g.userData.speed = 0.15 + Math.random() * 0.2; islandScene.add(g); clouds.push(g);
}
makeCloud(-12, 4, -7, 1.1); makeCloud(13, 6, 3, 1.4); makeCloud(-9, -2, 9, 1.0); makeCloud(10, -4, -8, 1.2); makeCloud(0, 8, -14, 1.6);
let motes;
{
  const N = 80, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) { const r = 5 + Math.random() * 8, a = Math.random() * Math.PI * 2; pos[i * 3] = Math.cos(a) * r; pos[i * 3 + 1] = Math.random() * 8 - 1; pos[i * 3 + 2] = Math.sin(a) * r; }
  const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  motes = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xfff3c4, size: 0.16, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false }));
  islandScene.add(motes);
}

const entrance = new THREE.Vector3(0, TOP_Y + 0.2, 4);
function placeEntrance() { entrance.set(0, TOP_Y + 0.2, radiusNow() + 1.0); }

// ---------------------------------------------------------------------
//  MESH BUILDERS
// ---------------------------------------------------------------------
function buildItemMesh(type) {
  const def = CATALOG[type]; const g = new THREE.Group(); const c = def.color;
  switch (type) {
    case 'yoga': { const plat = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 1.0, 0.18, 12), mat(c)); plat.position.y = 0.09; plat.receiveShadow = true; g.add(plat);
      for (let i = 0; i < 3; i++) { const arc = new THREE.Mesh(new THREE.TorusGeometry(0.5 - i * 0.13, 0.05, 6, 16, Math.PI), mat(0xffffff, { emissive: 0xbfe4ff, emissiveIntensity: 0.2 })); arc.position.set(0, 0.2 + i * 0.18, 0); arc.castShadow = true; g.add(arc); } break; }
    case 'meditation': { const base = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 1.05, 0.22, 8), mat(0xf0e3c8)); base.position.y = 0.11; base.receiveShadow = true; g.add(base);
      const dome = new THREE.Mesh(new THREE.SphereGeometry(0.62, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2), mat(c, { roughness: 0.6 })); dome.position.y = 0.22; dome.castShadow = true; g.add(dome);
      const tip = new THREE.Mesh(new THREE.OctahedronGeometry(0.14, 0), mat(0xffd76a, { emissive: 0xffd76a, emissiveIntensity: 0.5 })); tip.position.y = 0.95; g.add(tip); break; }
    case 'hotspring': { const ring = new THREE.Mesh(new THREE.TorusGeometry(0.78, 0.22, 6, 14), mat(0x9a9486)); ring.rotation.x = -Math.PI / 2; ring.position.y = 0.2; ring.castShadow = true; g.add(ring);
      const water = new THREE.Mesh(new THREE.CircleGeometry(0.78, 16), new THREE.MeshStandardMaterial({ color: c, roughness: 0.12, metalness: 0.1, transparent: true, opacity: 0.92 })); water.rotation.x = -Math.PI / 2; water.position.y = 0.26; g.add(water);
      for (let i = 0; i < 3; i++) { const st = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 5), mat(0xffffff, { transparent: true, opacity: 0.5 })); st.position.set((i - 1) * 0.3, 0.5, 0); g.add(st); } break; }
    case 'sleep': { const room = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.9, 1.7), mat(0xf3ead8)); room.position.y = 0.55; room.castShadow = true; room.receiveShadow = true; g.add(room);
      const roof = new THREE.Mesh(new THREE.ConeGeometry(1.45, 0.7, 4), mat(c)); roof.position.y = 1.32; roof.rotation.y = Math.PI / 4; roof.castShadow = true; g.add(roof);
      const moon = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 6), mat(0xffe9a8, { emissive: 0xffe9a8, emissiveIntensity: 0.5 })); moon.position.set(0, 1.0, 0.86); moon.name = 'glow'; g.add(moon); break; }
    case 'tree': { const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.16, 0.9, 6), mat(0xb98a4e)); trunk.position.y = 0.45; trunk.castShadow = true; g.add(trunk);
      for (let i = 0; i < 2; i++) { const blob = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5 - i * 0.12, 0), mat(c)); blob.position.y = 1.0 + i * 0.35; blob.castShadow = true; g.add(blob); } break; }
    case 'flower': { for (let i = 0; i < 5; i++) { const a = (i / 5) * Math.PI * 2; const st = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4), mat(0x5fae57)); st.position.set(Math.cos(a) * 0.22, 0.15, Math.sin(a) * 0.22); g.add(st); const fl = new THREE.Mesh(new THREE.IcosahedronGeometry(0.1, 0), mat(i % 2 ? c : 0xffd76a)); fl.position.set(Math.cos(a) * 0.22, 0.33, Math.sin(a) * 0.22); g.add(fl); } break; }
    case 'pond': { const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.66, 0.18, 12), mat(0xe8c98a)); rim.position.y = 0.09; rim.receiveShadow = true; g.add(rim);
      const water = new THREE.Mesh(new THREE.CircleGeometry(0.52, 16), new THREE.MeshStandardMaterial({ color: c, roughness: 0.12, metalness: 0.1, transparent: true, opacity: 0.92 })); water.rotation.x = -Math.PI / 2; water.position.y = 0.19; g.add(water); break; }
    case 'rock': { const r = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4, 0), mat(c)); r.position.y = 0.3; r.rotation.set(Math.random(), Math.random(), Math.random()); r.castShadow = true; g.add(r); break; }
    case 'lantern': { const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.7, 6), mat(0x9a9486)); post.position.y = 0.35; post.castShadow = true; g.add(post);
      const lamp = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.3, 0.26), mat(c, { emissive: c, emissiveIntensity: 0.3 })); lamp.position.y = 0.82; lamp.name = 'glow'; g.add(lamp); break; }
    case 'bench': { const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.08, 0.26), mat(c)); seat.position.y = 0.3; seat.castShadow = true; g.add(seat);
      const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.26, 0.06), mat(c)); back.position.set(0, 0.45, -0.1); g.add(back);
      for (const sx of [-0.28, 0.28]) { const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.3, 0.2), mat(0x8a6a3e)); leg.position.set(sx, 0.15, 0); g.add(leg); } break; }
    default: g.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), mat(c)));
  }
  return g;
}

const GUEST_COLORS = [0xe88c8c, 0x8cb6e8, 0x9ce0a0, 0xe8c98c, 0xc8a6ff, 0xf0a6d0, 0x86d6c8, 0xd6b86f];
function buildGuest() {
  const g = new THREE.Group();
  const hue = GUEST_COLORS[Math.floor(Math.random() * GUEST_COLORS.length)];

}

$('backBtn').addEventListener('click', exitInterior);
const inFloorPlane = new THREE.Mesh(new THREE.PlaneGeometry(14, 10), new THREE.MeshBasicMaterial({ visible: false })); inFloorPlane.rotation.x = -Math.PI / 2; interiorScene.add(inFloorPlane);
function interiorPlace(cx, cy) { if (!inSel) return false; const r = canvas.getBoundingClientRect(); ndc.x = ((cx - r.left) / r.width) * 2 - 1; ndc.y = -((cy - r.top) / r.height) * 2 + 1; ray.setFromCamera(ndc, camera); const h = ray.intersectObject(inFloorPlane, false)[0]; if (!h) return false; const def = INTERIOR_CATALOG[inSel]; if (state.money < def.cost) { toast('돈이 부족해요 💰'); return false; } const x = clamp(h.point.x, -6.2, 6.2), z = clamp(h.point.z, -4.2, 4.2); state.money -= def.cost; refreshHUD(); const rec = { type: inSel, x: +x.toFixed(2), z: +z.toFixed(2) }; (state.interiors[curInteriorKey] = state.interiors[curInteriorKey] || []).push(rec); addInteriorMesh(rec); save(); return true; }

// ---------------------------------------------------------------------
//  INPUT
// ---------------------------------------------------------------------
let dragging = false, moved = 0, lastX = 0, lastY = 0;
let camAz = 0.5, targetAz = 0.5, camTilt = 0.42, targetTilt = 0.42, camDist = 16, targetDist = 16;
let inAz = 0, inTargetAz = 0, inTilt = 0.5;
const tipEl = $('tip');
canvas.addEventListener('pointerdown', (e) => { dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY; });
canvas.addEventListener('pointermove', (e) => {
  if (dragging) { const dx = e.clientX - lastX, dy = e.clientY - lastY; moved += Math.abs(dx) + Math.abs(dy); lastX = e.clientX; lastY = e.clientY; if (mode === 'island') { targetAz -= dx * 0.005; targetTilt = clamp(targetTilt - dy * 0.003, 0.12, 0.95); } else { inTargetAz -= dx * 0.005; inTilt = clamp(inTilt - dy * 0.003, 0.15, 1.0); } }
  else if (mode === 'island') { if (selType) updateGhost(e.clientX, e.clientY); else { const it = pickItem(e.clientX, e.clientY); if (it) { tipEl.textContent = it.def.cat === 'facility' ? `${it.def.name} Lv.${it.level}` : it.def.name; tipEl.style.left = e.clientX + 'px'; tipEl.style.top = e.clientY + 'px'; tipEl.style.opacity = 1; canvas.style.cursor = 'pointer'; } else { tipEl.style.opacity = 0; canvas.style.cursor = 'grab'; } } }
});
canvas.addEventListener('pointerup', (e) => {
  dragging = false; if (moved > 7) return;
  if (mode === 'interior') { interiorPlace(e.clientX, e.clientY); return; }
  if (selType) { if (ghostCell && placeItem(selType, ghostCell.cx, ghostCell.cz)) updateGhost(e.clientX, e.clientY); return; }
  const it = pickItem(e.clientX, e.clientY);
  if (it) { if (sellMode) { sellItem(it); return; } if (it.def.cat === 'facility') openFacPopup(it); }
  else closeFacPopup();
});
canvas.addEventListener('pointerleave', () => { dragging = false; tipEl.style.opacity = 0; });
canvas.addEventListener('wheel', (e) => { e.preventDefault(); if (mode === 'island') targetDist = clamp(targetDist + Math.sign(e.deltaY) * 1.2, 9, 26); }, { passive: false });

// ---------------------------------------------------------------------
//  DAY / NIGHT
// ---------------------------------------------------------------------
const DAY_LEN = 150; // seconds per full cycle
let tod = 0.32;      // start mid-morning
const DAY = { top: 0x6fb7ff, mid: 0xbfe4ff, bot: 0xffe9c9 };
const NIGHT = { top: 0x10204a, mid: 0x243b6b, bot: 0x3a3160 };
const DUSK = 0xff9e6b;
let nightFactor = 0;
function updateDayNight(dt) {
  tod = (tod + dt / DAY_LEN) % 1;
  const ang = (tod - 0.25) * Math.PI * 2;       // 0 at sunrise
  const elev = Math.sin(ang);                    // -1..1
  const daylight = clamp((elev + 0.12) / 0.5, 0, 1);
  nightFactor = 1 - daylight;
  const dusk = clamp(1 - Math.abs(elev) / 0.35, 0, 1) * (tod > 0.5 || tod < 0.25 ? 1 : 1); // glow near horizon
  // sky
  skyMat.uniforms.top.value.copy(cLerp(NIGHT.top, DAY.top, daylight));
  skyMat.uniforms.mid.value.copy(cLerp(NIGHT.mid, DAY.mid, daylight));
  let bot = cLerp(NIGHT.bot, DAY.bot, daylight); bot.lerp(new THREE.Color(DUSK), dusk * 0.55);
  skyMat.uniforms.bottom.value.copy(bot);
  islandScene.fog.color.copy(skyMat.uniforms.mid.value);
  // sun
  sun.position.set(Math.cos(ang) * 14, Math.max(-2, elev * 16) + 3, 8 + Math.sin(ang) * 4);
  sun.intensity = lerp(0.05, 1.7, daylight);
  sun.color.copy(cLerp(0xff9e6b, 0xfff1d6, clamp(daylight * 1.3, 0, 1)));
  hemi.intensity = lerp(0.28, 0.95, daylight);
  moonLight.intensity = nightFactor * 0.5;
  renderer.toneMappingExposure = lerp(0.82, 1.06, daylight);
  // lanterns + glows
  for (const it of liveItems.values()) {
    if (it.light) it.light.intensity = nightFactor * 1.6;
    if (it.glowMat) it.glowMat.emissiveIntensity = (it.type === 'sleep' ? 0.4 : 0.25) + nightFactor * 1.1;
  }
  if (motes) motes.material.opacity = 0.45 + nightFactor * 0.5;
}

// ---------------------------------------------------------------------
//  LOOP
// ---------------------------------------------------------------------
function resize() { const w = innerWidth, h = innerHeight; renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();
let last = performance.now(), saveAccum = 0;
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  updateDayNight(dt);
  if (mode === 'island') {
    if (!dragging && !selType) targetAz += 0.0006;
    camAz = lerp(camAz, targetAz, 0.08); camTilt = lerp(camTilt, targetTilt, 0.08); camDist = lerp(camDist, targetDist, 0.08);
    camera.position.set(Math.sin(camAz) * camDist * Math.cos(camTilt), 4 + Math.sin(camTilt) * camDist * 0.7, Math.cos(camAz) * camDist * Math.cos(camTilt));
    camera.lookAt(0, 0.3, 0);
    island.position.y = Math.sin(now * 0.0006) * 0.16;
    for (const it of liveItems.values()) { if (it.mesh.userData.popT < 1) { it.mesh.userData.popT = Math.min(1, it.mesh.userData.popT + dt * 4); const s = 1 - Math.pow(1 - it.mesh.userData.popT, 3); it.mesh.scale.setScalar(s); } }
    spawnTimer -= dt; const interval = clamp(7 - totalCharm() * 0.08, 2.2, 7);
    if (spawnTimer <= 0 && guests.length < 16) { spawnTimer = interval; spawnGuest(); }
    updateGuests(dt); guestsEl.textContent = guests.length; satEl.textContent = centerSat; moodIcoEl.textContent = centerSat > 65 ? '😊' : centerSat > 35 ? '😐' : '😞';
    for (const c of clouds) { c.position.x += c.userData.speed * 0.01; if (c.position.x > 18) c.position.x = -18; }
    if (motes) { const p = motes.geometry.attributes.position; for (let i = 0; i < p.count; i++) { let y = p.getY(i) + 0.006; if (y > 8) y = -1; p.setY(i, y); } p.needsUpdate = true; }
    renderer.render(islandScene, camera);
  } else {
    inAz = lerp(inAz, inTargetAz, 0.08); const d = 13;
    camera.position.set(Math.sin(inAz) * d * Math.cos(inTilt), 3 + Math.sin(inTilt) * d, Math.cos(inAz) * d * Math.cos(inTilt));
    camera.lookAt(0, 1.0, -0.5);
    renderer.render(interiorScene, camera);
  }
  saveAccum += dt; if (saveAccum > 8) { saveAccum = 0; save(); }
}

// ---------------------------------------------------------------------
//  BOOT
// ---------------------------------------------------------------------
load(); buildLand(radiusNow()); placeEntrance(); rebuildAll(); buildPalette(); refreshHUD();
requestAnimationFrame(frame);
send({ type: 'ready' });
addEventListener('visibilitychange', () => { if (document.hidden) save(); });

window.__OASIS = {
  state, get money() { return state.money; }, set money(v) { state.money = v; refreshHUD(); },
  place: (t, cx, cz) => placeItem(t, cx, cz), upgrade: (k) => upgradeFacility(k), charm: totalCharm, guests, liveItems,
  spawn: spawnGuest, enter: enterInterior, exit: exitInterior, save, CATALOG,
  get centerSat() { return centerSat; }, get nightFactor() { return nightFactor; }, get tod() { return tod; }, setTod: (v) => { tod = v; },
  applyDayNight: () => { updateDayNight(0); return { nightFactor, lantern: [...liveItems.values()].find((it) => it.light)?.light.intensity ?? null, skyMid: '#' + skyMat.uniforms.mid.value.getHexString() }; },
  reset: () => { Object.assign(state, freshState()); nextKey = 1; guests.length = 0; while (guestGroup.children.length) guestGroup.remove(guestGroup.children[0]); recentSat.length = 0; centerSat = 100; rebuildAll(); buildLand(radiusNow()); refreshHUD(); },
  tick: (n = 1, dt = 0.1) => { for (let i = 0; i < n; i++) updateGuests(dt); refreshHUD(); return state.money; },
};
</script>
</body>
