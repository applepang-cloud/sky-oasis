<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Sky Oasis Hub</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #bfe3ff; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  /* soft floating label that follows a hovered spot */
  #tip {
    position: fixed; left: 0; top: 0; transform: translate(-50%, -130%);
    padding: 6px 12px; border-radius: 14px;
    background: rgba(255,255,255,0.82); color: #4a4030;
    font: 600 14px/1 "Segoe UI", system-ui, sans-serif;
    box-shadow: 0 6px 18px rgba(80,110,140,0.25);
    pointer-events: none; opacity: 0; transition: opacity .18s ease;
    white-space: nowrap;
  }
  /* ---- hub chrome (top bar + sliding game menu) ---- */
  * { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
  #topbar {
    position: fixed; left: 14px; top: 14px; display: flex; align-items: center; gap: 12px; z-index: 5;
  }
  .glass {
    background: rgba(255,255,255,0.82); color: #4a4030;
    box-shadow: 0 6px 18px rgba(80,110,140,0.22);
    border: none; backdrop-filter: blur(4px);
  }
  #menuBtn {
    width: 46px; height: 46px; border-radius: 50%; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: transform .15s ease;
  }
  #menuBtn:active { transform: scale(0.92); }
  #title {
    padding: 9px 16px; border-radius: 22px; font-weight: 800; font-size: 17px; letter-spacing: .5px;
  }
  #scrim {
    position: fixed; inset: 0; background: rgba(40,55,75,0.14); z-index: 6;
    opacity: 0; pointer-events: none; transition: opacity .22s ease;
  }
  #scrim.open { opacity: 1; pointer-events: auto; }
  #menu {
    position: fixed; left: 14px; top: 72px; width: min(320px, calc(100vw - 28px));
    border-radius: 24px; padding: 14px; z-index: 7;
    transform: translateY(-12px) scale(0.97); opacity: 0; pointer-events: none;
    transform-origin: top left; transition: opacity .2s ease, transform .2s ease;
  }
  #menu.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
  #menu .head { font-size: 14px; font-weight: 700; color: #8a8270; margin: 2px 6px 10px; }
  .tile {
    display: flex; align-items: center; gap: 12px; padding: 11px 12px; margin: 6px 0;
    border-radius: 16px; cursor: pointer; transition: transform .12s ease, filter .12s ease;
  }
  .tile:hover { filter: brightness(1.04); }
  .tile:active { transform: scale(0.98); }
  .tile .ic {
    width: 44px; height: 44px; border-radius: 13px; display: flex; align-items: center;
    justify-content: center; font-size: 24px; flex: 0 0 auto;
  }
  .tile .txt { flex: 1 1 auto; min-width: 0; }
  .tile .nm { font-size: 15px; font-weight: 700; color: #4a4030; }
  .tile .tl { font-size: 12px; color: #8a8270; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile .arr { color: #b0a890; font-size: 20px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tip"></div>

<div id="topbar">
  <div id="menuBtn" class="glass">☰</div>
  <div id="title" class="glass">하늘 오아시스</div>
</div>
<div id="scrim"></div>
<div id="menu" class="glass">
  <div class="head">미니게임</div>
  <div id="menuList"></div>
</div>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ---------- helpers ----------
const send = (msg) => { try { parent.postMessage(Object.assign({ source: 'hub' }, msg), '*'); } catch (e) {} };
const lerp = (a, b, t) => a + (b - a) * t;

// ---------- renderer / scene / camera ----------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xcfe9ff, 22, 60);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);

// ---------- sky gradient backdrop ----------
{
  const skyGeo = new THREE.SphereGeometry(90, 24, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      top:    { value: new THREE.Color(0x6fb7ff) },
      mid:    { value: new THREE.Color(0xbfe4ff) },
      bottom: { value: new THREE.Color(0xffe9c9) },
    },
    vertexShader: `varying vec3 vp; void main(){ vp = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `
      varying vec3 vp; uniform vec3 top; uniform vec3 mid; uniform vec3 bottom;
      void main(){
        float h = normalize(vp).y;            // -1..1
        vec3 col = h > 0.0 ? mix(mid, top, h) : mix(mid, bottom, -h);
        gl_FragColor = vec4(col, 1.0);
      }`,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
}

// ---------- lights ----------
scene.add(new THREE.HemisphereLight(0xddeeff, 0xe7c79a, 0.95));
const sun = new THREE.DirectionalLight(0xfff1d6, 1.7);
sun.position.set(8, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 50;
sun.shadow.camera.left = -12; sun.shadow.camera.right = 12;
sun.shadow.camera.top = 12; sun.shadow.camera.bottom = -12;
sun.shadow.bias = -0.0004;
scene.add(sun);

// ---------- material helper (low-poly flat) ----------
const mat = (color, opts = {}) => new THREE.MeshStandardMaterial(Object.assign({
  color, flatShading: true, roughness: 0.95, metalness: 0.0,
}, opts));

// ============================================================
//  THE FLOATING ISLAND
// ============================================================
const island = new THREE.Group();
scene.add(island);

const TOP_R = 5.4;     // radius of the island top
const TOP_Y = 0;       // top surface sits at y = 0

// rocky underside (inverted, tapering to a point) — 7 sided for chunky facets
{
  const rock = new THREE.Mesh(
    new THREE.CylinderGeometry(TOP_R * 0.92, 0.5, 6.5, 7, 3),
    mat(0x8a5a3b, { roughness: 1.0 })
  );
  rock.position.y = TOP_Y - 3.4;
  rock.castShadow = true; rock.receiveShadow = true;
  // jitter vertices a touch for a natural craggy look
  const p = rock.geometry.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const y = p.getY(i);
    if (y > -3.2 && y < 3.1) {
      p.setX(i, p.getX(i) + (Math.sin(i * 12.9) * 0.25));
      p.setZ(i, p.getZ(i) + (Math.cos(i * 7.3) * 0.25));
    }
  }
  p.needsUpdate = true; rock.geometry.computeVertexNormals();
  island.add(rock);
}

// sandy top slab
{
  const sand = new THREE.Mesh(
    new THREE.CylinderGeometry(TOP_R, TOP_R * 0.94, 1.1, 7, 1),
    mat(0xf3d9a0)
  );
  sand.position.y = TOP_Y - 0.55;
  sand.castShadow = true; sand.receiveShadow = true;
  island.add(sand);

  // thin grassy rim on top edge
  const grass = new THREE.Mesh(
    new THREE.CylinderGeometry(TOP_R + 0.05, TOP_R, 0.35, 7, 1),
    mat(0x8fc06a)
  );
  grass.position.y = TOP_Y + 0.02;
  grass.receiveShadow = true;
  island.add(grass);

  // flat walkable sand surface
  const surf = new THREE.Mesh(new THREE.CircleGeometry(TOP_R, 7), mat(0xf6e2b0));
  surf.rotation.x = -Math.PI / 2;
  surf.position.y = TOP_Y + 0.2;
  surf.receiveShadow = true;
  island.add(surf);
}

// ---------- oasis pond ----------
{
  const water = new THREE.Mesh(
    new THREE.CircleGeometry(1.7, 18),
    new THREE.MeshStandardMaterial({ color: 0x49b6d6, roughness: 0.15, metalness: 0.1, transparent: true, opacity: 0.92 })
  );
  water.rotation.x = -Math.PI / 2;
  water.position.set(-0.4, TOP_Y + 0.24, 1.0);
  island.add(water);
  // sandy pond rim
  const rim = new THREE.Mesh(new THREE.RingGeometry(1.7, 2.05, 18), mat(0xe8c98a));
  rim.rotation.x = -Math.PI / 2;
  rim.position.set(-0.4, TOP_Y + 0.22, 1.0);
  rim.receiveShadow = true;
  island.add(rim);
}

// ---------- foliage builders ----------
function palmTree(x, z, s = 1) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12 * s, 0.18 * s, 1.8 * s, 6), mat(0xb98a4e));
  trunk.position.y = 0.9 * s; trunk.castShadow = true; trunk.rotation.z = 0.08;
  g.add(trunk);
  const leafMat = mat(0x5fae57);
  for (let i = 0; i < 6; i++) {
    const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.28 * s, 1.5 * s, 4), leafMat);
    leaf.position.y = 1.8 * s;
    leaf.rotation.z = Math.PI / 2.3;
    leaf.rotation.y = (i / 6) * Math.PI * 2;
    leaf.position.x = Math.cos((i / 6) * Math.PI * 2) * 0.55 * s;
    leaf.position.z = Math.sin((i / 6) * Math.PI * 2) * 0.55 * s;
    leaf.castShadow = true;
    g.add(leaf);
  }
  g.position.set(x, TOP_Y + 0.2, z);
  island.add(g);
  return g;
}
function cactus(x, z, s = 1) {
  const g = new THREE.Group();
  const m = mat(0x4f9d5d);
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22 * s, 0.26 * s, 1.2 * s, 6), m);
  body.position.y = 0.6 * s; body.castShadow = true; g.add(body);
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1 * s, 0.12 * s, 0.5 * s, 6), m);
  arm.position.set(0.28 * s, 0.7 * s, 0); arm.castShadow = true; g.add(arm);
  g.position.set(x, TOP_Y + 0.2, z);
  island.add(g);
  return g;
}
function rock(x, z, s = 1) {
  const r = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4 * s, 0), mat(0x9a9486));
  r.position.set(x, TOP_Y + 0.3 * s, z);
  r.rotation.set(Math.random(), Math.random(), Math.random());
  r.castShadow = true; r.receiveShadow = true;
  island.add(r);
  return r;
}

palmTree(2.6, -1.4, 1.1);
palmTree(3.4, 0.6, 0.85);
palmTree(-2.8, -2.2, 0.95);
cactus(1.8, 2.6, 1.0);
cactus(-3.4, 1.6, 0.8);
rock(0.4, -2.8, 1.2);
rock(-1.6, 2.9, 0.9);
rock(3.0, 2.2, 0.7);

// ---------- the little fox character ----------
const fox = new THREE.Group();
{
  const orange = mat(0xe8843c);
  const cream = mat(0xf5e9d6);
  const body = new THREE.Mesh(new THREE.IcosahedronGeometry(0.42, 0), orange);
  body.scale.set(1, 0.85, 1.15); body.position.y = 0.42; body.castShadow = true; fox.add(body);
  const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.3, 0), orange);
  head.position.set(0, 0.72, 0.32); head.castShadow = true; fox.add(head);
  const snout = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.26, 5), cream);
  snout.rotation.x = Math.PI / 2; snout.position.set(0, 0.68, 0.6); fox.add(snout);
  for (const sx of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.26, 4), orange);
    ear.position.set(sx * 0.16, 0.98, 0.26); fox.add(ear);
  }
  const tail = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.7, 5), orange);
  tail.rotation.x = -Math.PI / 3; tail.position.set(0, 0.46, -0.5); tail.castShadow = true; fox.add(tail);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.3, 5), cream);
  tip.rotation.x = -Math.PI / 3; tip.position.set(0, 0.66, -0.74); fox.add(tip);
}
fox.position.set(1.2, TOP_Y + 0.2, -0.2);
fox.rotation.y = -0.7;
island.add(fox);

// ============================================================
//  DRIFTING CLOUDS
// ============================================================
const clouds = [];
function makeCloud(x, y, z, s) {
  const g = new THREE.Group();
  const m = mat(0xffffff, { roughness: 1.0, emissive: 0xeaf4ff, emissiveIntensity: 0.05 });
  const puffs = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < puffs; i++) {
    const puff = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8 + Math.random() * 0.6, 0), m);
    puff.position.set((i - puffs / 2) * 0.9, Math.random() * 0.3, Math.random() * 0.5 - 0.25);
    puff.scale.y = 0.7;
    g.add(puff);
  }
  g.position.set(x, y, z);
  g.scale.setScalar(s);
  g.userData.spin = (Math.random() - 0.5) * 0.02;
  g.userData.speed = 0.15 + Math.random() * 0.2;
  scene.add(g);
  clouds.push(g);
}
makeCloud(-10, 3, -6, 1.1);
makeCloud(11, 5, 2, 1.4);
makeCloud(-8, -2, 8, 1.0);
makeCloud(9, -4, -7, 1.2);
makeCloud(0, 7, -12, 1.6);

// ============================================================
//  FLOATING LIGHT MOTES (fireflies)
// ============================================================
let motes;
{
  const N = 90, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 5 + Math.random() * 7, a = Math.random() * Math.PI * 2;
    pos[i * 3] = Math.cos(a) * r;
    pos[i * 3 + 1] = Math.random() * 8 - 1;
    pos[i * 3 + 2] = Math.sin(a) * r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  motes = new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xfff3c4, size: 0.16, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  scene.add(motes);
}

// ============================================================
//  GAME SPOTS (clickable markers) — built from parent config
// ============================================================
const spots = [];
const spotRoot = new THREE.Group();
island.add(spotRoot);

function clearSpots() {
  for (const s of spots) spotRoot.remove(s.group);
  spots.length = 0;
}

function addSpot({ id, label, color = 0xffd76a, x = 0, z = 0 }) {
  const g = new THREE.Group();
  // glowing ground ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.7, 0.09, 8, 24),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6, roughness: 0.4 })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.05;
  g.add(ring);
  // floating beacon gem
  const gem = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.34, 0),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5, roughness: 0.25, metalness: 0.2 })
  );
  gem.position.y = 1.25;
  gem.castShadow = true;
  g.add(gem);
  // soft light pillar
  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.45, 2.2, 12, 1, true),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.12, side: THREE.DoubleSide, depthWrite: false })
  );
  beam.position.y = 1.1;
  g.add(beam);

  g.position.set(x, TOP_Y + 0.2, z);
  g.userData = { id, label, gem, ring, base: gem.position.y, hover: 0 };
  spotRoot.add(g);
  spots.push({ id, label, group: g });
}

// ---------- HTML menu (built from the same game list) ----------
const menuList = document.getElementById('menuList');
const menuEl = document.getElementById('menu');
const scrimEl = document.getElementById('scrim');
const menuBtn = document.getElementById('menuBtn');
const hex = (n) => '#' + (n & 0xffffff).toString(16).padStart(6, '0');

function setMenuOpen(open) {
  menuEl.classList.toggle('open', open);
  scrimEl.classList.toggle('open', open);
  menuBtn.textContent = open ? '✕' : '☰';
}
menuBtn.addEventListener('click', () => setMenuOpen(!menuEl.classList.contains('open')));
scrimEl.addEventListener('click', () => setMenuOpen(false));

const DEFAULT_TAGLINES = {
  memory: '같은 그림의 카드를 찾아 짝을 맞춰요',
  catch: '떨어지는 별을 바구니로 받아요',
  zen: '돌을 쌓으며 마음을 가라앉혀요',
};
const DEFAULT_EMOJI = { memory: '🃏', catch: '⭐', zen: '🪨' };

function buildMenu(games) {
  menuList.innerHTML = '';
  for (const g of games) {
    const c = g.color ?? 0xffd76a;
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.background = hex(c) + '29'; // ~16% alpha
    tile.innerHTML =
      `<div class="ic" style="background:${hex(c)}59">${g.emoji ?? DEFAULT_EMOJI[g.id] ?? '🎮'}</div>` +
      `<div class="txt"><div class="nm"></div><div class="tl"></div></div>` +
      `<div class="arr">›</div>`;
    tile.querySelector('.nm').textContent = g.label;
    tile.querySelector('.tl').textContent = g.tagline ?? DEFAULT_TAGLINES[g.id] ?? '';
    tile.addEventListener('click', () => { setMenuOpen(false); send({ type: 'enterGame', id: g.id, label: g.label }); });
    menuList.appendChild(tile);
  }
}

// ---------- build everything (3D spots + menu) from one list ----------
function buildGames(games) {
  clearSpots();
  const n = games.length;
  games.forEach((game, i) => {
    const ang = (-0.9) + (n > 1 ? (i / (n - 1)) * 1.8 : 0.9);
    const rr = 3.1;
    addSpot({
      id: game.id, label: game.label, color: game.color ?? 0xffd76a,
      x: Math.sin(ang) * rr, z: -Math.cos(ang) * rr + 0.6,
    });
  });
  buildMenu(games);
}

// receive game list from Flutter shell
window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === 'setGames' && Array.isArray(d.games)) buildGames(d.games);
});

// fallback demo list if opened standalone (no Flutter parent)
setTimeout(() => {
  if (spots.length === 0) {
    buildGames([
      { id: 'memory', label: '카드 짝맞추기', color: 0xffd76a },
      { id: 'catch', label: '별 받기', color: 0x8fd0ff },
      { id: 'zen', label: '명상의 돌', color: 0xc8a6ff },
    ]);
  }
}, 600);

// ============================================================
//  INTERACTION — raycast click + drag-to-look
// ============================================================
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const tip = document.getElementById('tip');
let hovered = null;

let dragging = false, moved = 0, lastX = 0, lastY = 0;
let camAz = 0.5, targetAz = 0.5, camTilt = 0.36, targetTilt = 0.36;

function pickSpot(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  const meshes = [];
  for (const s of spots) s.group.traverse((o) => { if (o.isMesh) { o.userData._spot = s.group; meshes.push(o); } });
  const hit = ray.intersectObjects(meshes, false)[0];
  return hit ? hit.object.userData._spot : null;
}

canvas.addEventListener('pointerdown', (e) => { dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY; });
canvas.addEventListener('pointermove', (e) => {
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    moved += Math.abs(dx) + Math.abs(dy);
    lastX = e.clientX; lastY = e.clientY;
    targetAz -= dx * 0.005;
    targetTilt = Math.max(0.08, Math.min(0.7, targetTilt - dy * 0.003));
  } else {
    const sp = pickSpot(e.clientX, e.clientY);
    hovered = sp;
    if (sp) {
      tip.textContent = sp.userData.label;
      tip.style.left = e.clientX + 'px'; tip.style.top = e.clientY + 'px';
      tip.style.opacity = 1; canvas.style.cursor = 'pointer';
      send({ type: 'hover', id: sp.userData.id });
    } else { tip.style.opacity = 0; canvas.style.cursor = 'grab'; }
  }
});
canvas.addEventListener('pointerup', (e) => {
  dragging = false;
  if (moved < 6) {
    const sp = pickSpot(e.clientX, e.clientY);
    if (sp) send({ type: 'enterGame', id: sp.userData.id, label: sp.userData.label });
  }
});
canvas.addEventListener('pointerleave', () => { dragging = false; tip.style.opacity = 0; });

// ============================================================
//  RESIZE + RENDER LOOP
// ============================================================
function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

let t = 0;
function frame() {
  requestAnimationFrame(frame);
  t += 0.016;

  // gentle auto-drift of the camera azimuth (breathing) unless dragging
  if (!dragging) targetAz += 0.0009;
  camAz = lerp(camAz, targetAz, 0.06);
  camTilt = lerp(camTilt, targetTilt, 0.06);
  const dist = 15.5;
  camera.position.set(
    Math.sin(camAz) * dist * Math.cos(camTilt),
    6.5 + Math.sin(camTilt) * 6 + Math.sin(t * 0.5) * 0.25,
    Math.cos(camAz) * dist * Math.cos(camTilt)
  );
  camera.lookAt(0, 0.4, 0);

  // island bobs softly
  island.position.y = Math.sin(t * 0.6) * 0.18;
  island.rotation.y = Math.sin(t * 0.15) * 0.02;

  // fox idle breathing
  fox.scale.y = 1 + Math.sin(t * 1.6) * 0.02;

  // clouds drift around
  for (const c of clouds) {
    c.position.x += Math.sin(t * 0.1 + c.position.z) * 0.002 * 0 + c.userData.speed * 0.01;
    if (c.position.x > 16) c.position.x = -16;
    c.rotation.y += c.userData.spin * 0.2;
    c.position.y += Math.sin(t * 0.4 + c.position.x) * 0.002;
  }

  // motes float upward + twinkle
  if (motes) {
    const p = motes.geometry.attributes.position;
    for (let i = 0; i < p.count; i++) {
      let y = p.getY(i) + 0.006;
      if (y > 8) y = -1;
      p.setY(i, y);
    }
    p.needsUpdate = true;
    motes.material.opacity = 0.6 + Math.sin(t * 2) * 0.25;
  }

  // spot animations: bob gem, pulse ring, grow on hover
  for (const s of spots) {
    const u = s.group.userData;
    u.hover = lerp(u.hover, hovered === s.group ? 1 : 0, 0.15);
    u.gem.position.y = u.base + Math.sin(t * 2 + s.group.position.x) * 0.12 + u.hover * 0.25;
    u.gem.rotation.y += 0.02;
    const sc = 1 + u.hover * 0.25;
    u.ring.scale.setScalar(sc);
    u.ring.material.emissiveIntensity = 0.5 + Math.sin(t * 3) * 0.15 + u.hover * 0.5;
  }

  renderer.render(scene, camera);
}
frame();

// tell the shell we're ready to receive the game list
send({ type: 'ready' });
</script>
</body>
